// ─── CLUB RATINGS (força 1-100) ──────────────────────────────────────────────
const CLUB_RATINGS = {

  "Real Madrid":97,"Barcelona":95,"Manchester City":96,"Bayern Munich":95,"PSG":93,

  // Menores
  "Bodo/Glimt":68,"Ferencvaros":70,"Sheriff":65,"Maccabi":66,"Ludogorets":67,
};
function getRating(team){ return CLUB_RATINGS[team] || 75; }

// Calcula odds realistas baseado na força relativa
function calcSmartOdds(myTeam, opponent){
  const rA = getRating(myTeam), rB = getRating(opponent);
  const diff = rA - rB; // positivo = meu time é mais forte
  // Probabilidade implícita usando diff
  const pA = 0.5 + diff * 0.006; // base 50%, ajuste por diferença
  const pD = 0.25 - Math.abs(diff)*0.001;
  const pB = Math.max(0.04, 1 - pA - pD);
  // Odd = 1/prob com margem da casa ~5%
  const margin = 1.05;
  const oddA = +(margin/Math.max(0.05, pA)).toFixed(2);
  const oddD = +(margin/Math.max(0.10, pD)).toFixed(2);
  const oddB = +(margin/Math.max(0.05, pB)).toFixed(2);
  return { A: Math.max(1.02, oddA), D: Math.max(1.10, oddD), B: Math.max(1.02, oddB) };
}

function rand(a,b){ return +(a+Math.random()*(b-a)).toFixed(2); }

// Types that score a goal for score counting
const GOAL_TYPES = ["goal","goal_left","goal_right","goal_head","goal_outside","goal_lob","goal_post","fk_goal","corner_goal"];

function genOdds(myTeam, opponent, players=[]){
  const smart = calcSmartOdds(myTeam, opponent);
  const totGoals = rand(1.3, 2.1);

  // Player odds — gerar para cada jogador cadastrado
  const playerOdds = players.flatMap(name=>[
    {label:`${name} marca gol`,     key:`pl_gol_${name}`,  odd:rand(1.8,4.0),  playerName:name, playerAction:"gol"},
    {label:`${name} dá assistência`,key:`pl_ass_${name}`,  odd:rand(2.5,5.5),  playerName:name, playerAction:"assist"},
  ]);

    "Resultado Final":[
      {label:myTeam,      key:"casa",  odd:smart.A},
      {label:"Empate",    key:"empate",odd:smart.D},

    ],
    "Total de Gols":[
      {label:"+0.5",key:"g05m", odd:rand(1.05,1.25)},{label:"-0.5",key:"g05me",odd:rand(3.0,6.0)},
      {label:"+1.5",key:"g15m", odd:rand(1.25,1.7)}, {label:"-1.5",key:"g15me",odd:rand(2.0,3.0)},
      {label:"+2.5",key:"g25m", odd:+(totGoals).toFixed(2)},{label:"-2.5",key:"g25me",odd:rand(1.3,1.9)},
      {label:"+3.5",key:"g35m", odd:rand(3.0,6.5)}, {label:"-3.5",key:"g35me",odd:rand(1.1,1.4)},
    ],
    "BTTS":[
      {label:"Sim",key:"btts_s",odd:rand(1.5,2.2)},
      {label:"Não",key:"btts_n",odd:rand(1.6,2.2)},
    ],
    "Handicap":[
      {label:myTeam+" −1",    key:"hc1",odd:+(smart.A*1.8).toFixed(2)},
      {label:myTeam+" +1",    key:"hc2",odd:+(smart.A*0.55).toFixed(2)},
      {label:opponent+" −1",  key:"hc3",odd:+(smart.B*1.8).toFixed(2)},
      {label:opponent+" +1",  key:"hc4",odd:+(smart.B*0.55).toFixed(2)},
    ],
    "Meu Jogador":[
      {label:"Marcar gol",      key:"pj_gol", odd:rand(1.7,3.2)},
      {label:"2+ gols",         key:"pj_2g",  odd:rand(2.8,6.5)},
      {label:"Hat-trick",       key:"pj_hat", odd:rand(7.0,16.0)},
      {label:"Dar assistência", key:"pj_ass", odd:rand(2.2,4.5)},
      {label:"Gol de falta",    key:"pj_fk",  odd:rand(4.5,13.0)},
      {label:"Gol escanteio",   key:"pj_corn",odd:rand(5.5,12.0)},
      {label:"Melhor em campo", key:"pj_motm",odd:rand(2.2,5.5)},
    ],
    "Tipo de Gol":[
      {label:"Pé esquerdo",      key:"tg_left",    odd:rand(2.5,4.5)},
      {label:"Pé direito",       key:"tg_right",   odd:rand(1.4,2.5)},
      {label:"Cabeça",           key:"tg_head",    odd:rand(3.5,7.0)},
      {label:"Fora da área",     key:"tg_outside", odd:rand(4.5,9.0)},
      {label:"Cobertura (lob)",  key:"tg_lob",     odd:rand(8.0,18.0)},

// ─── AMENDOIM CALC ────────────────────────────────────────────────────────────
function calcPnuts(events, isNational, isFinal, isWin){
  const m = isNational?1.5:1;
  let t = 0;
  let cardDebt = 0;   // dívida por cartões
  let goalCount = 0;  // total de gols para quitar dívida

  for(const e of events){
    switch(e.type){
      case "goal":         t += Math.ceil(2*m); goalCount++; break;
      case "goal_right":   t += Math.ceil(2*m); goalCount++; break;
      case "goal_left":    t += Math.ceil(3*m); goalCount++; break;
      case "goal_head":    t += Math.ceil(3*m); goalCount++; break;
      case "goal_outside": t += Math.ceil(4*m); goalCount++; break;
      case "goal_lob":     t += Math.ceil(5*m); goalCount++; break;
      case "goal_post":    t += Math.ceil(5*m); goalCount++; break;
      case "fk_goal":      t += Math.ceil(4*m); goalCount++; break;
      case "corner_goal":  t += Math.ceil(3*m); goalCount++; break;
      case "assist":       t += Math.ceil(1*m); break;
      case "yellow":       cardDebt += 1; break;
      case "red":          cardDebt += 3; break;
      default: break;
    }
  }

  // Bônus hat-trick / dobradinha
  if(goalCount>=3) t += isNational?5:3;
  else if(goalCount===2) t += isNational?3:2;

  // Bônus assistências
  const assists = events.filter(e=>e.type==="assist").length;
  if(assists>=3) t += isNational?5:3;

  // Bônus final
  if(isFinal&&goalCount>0) t += isNational?3:2;
  if(isFinal&&isWin) t += 1;

  // Sistema de dívida: cartão amarelo = -1, vermelho = -3
  // Se fizer gol na partida, quita a dívida. Caso contrário, desconta do total.
  if(cardDebt > 0){
    if(goalCount > 0){
      // Gol quita a dívida — notação no retorno via debtCleared flag
      t = Math.max(0, t - 0); // dívida quitada pelo gol, não desconta mais
    } else {
      t = Math.max(0, t - cardDebt);
    }
  }

  return { total: t, cardDebt, debtCleared: cardDebt>0 && goalCount>0, goalCount };
}

function calcPnutsTotal(events, isNational, isFinal, isWin){
  const r = calcPnuts(events, isNational, isFinal, isWin);
  return r.total;
}

function calcSynergy(bets, events, isWin){
  let b = 0;
  const g   = events.filter(e=>GOAL_TYPES.includes(e.type)).length;
  const as  = events.filter(e=>e.type==="assist").length;
  const hasFk  = events.some(e=>e.type==="fk_goal");
  const hasCor = events.some(e=>e.type==="corner_goal");
  const hasLeft = events.some(e=>e.type==="goal_left");
  const hasRight= events.some(e=>e.type==="goal_right");
  const hasHead = events.some(e=>e.type==="goal_head");
  const hasOut  = events.some(e=>e.type==="goal_outside");
  const hasLob  = events.some(e=>e.type==="goal_lob");
  const hasPost = events.some(e=>e.type==="goal_post");
  for(const bet of bets){
    const k=bet.key;
    if(k==="pj_gol"  && g>0)     b+=1;
    if(k==="pj_ass"  && as>0)    b+=1;
    if(k==="pj_fk"   && hasFk)   b+=1;
    if(k==="pj_corn" && hasCor)  b+=1;
    if(k==="pj_2g"   && g>=2)    b+=1;
    if(k==="pj_hat"  && g>=3)    b+=2;
    if(k==="casa"    && isWin)   b+=1;
    if(k==="pj_motm" && isWin)   b+=1;
    if(k==="tg_left"    && hasLeft)  b+=2;
    if(k==="tg_right"   && hasRight) b+=1;
    if(k==="tg_head"    && hasHead)  b+=2;
    if(k==="tg_outside" && hasOut)   b+=2;
    if(k==="tg_lob"     && hasLob)   b+=3;
    if(k==="tg_post"    && hasPost)  b+=3;
    // Player bets synergy
    if(bet.playerAction==="gol" && g>0) b+=1;
    if(bet.playerAction==="assist" && as>0) b+=1;
  }
  return b;
}

function calcStats(pesHistory){
  const s = {
    totalGoals:0, fkGoals:0, cornerGoals:0, totalAssists:0,
    totalMatches:pesHistory.length, hatTricks:0, finalGoals:0,
    totalPnuts:0, totalSynergy:0, winStreak:0, wins:0,
    goalLeft:0, goalRight:0, goalHead:0, goalOutside:0, goalLob:0, goalPost:0,
  };
  let streak=0, maxStreak=0;
  for(const p of [...pesHistory].reverse()){
    const sm = p.summary||{};
    s.totalGoals   += (sm.totalGoals||0)||(sm.goals||0)+(sm.fkGoals||0)+(sm.cornerGoals||0);
    s.fkGoals      += sm.fkGoals||0;
    s.cornerGoals  += sm.cornerGoals||0;
    s.goalLeft     += sm.goalLeft||0;
    s.goalRight    += sm.goalRight||0;
    s.goalHead     += sm.goalHead||0;
    s.goalOutside  += sm.goalOutside||0;
    s.goalLob      += sm.goalLob||0;
    s.goalPost     += sm.goalPost||0;
    s.totalAssists += sm.assists||0;
    s.hatTricks    += sm.hatTrick?1:0;
    s.finalGoals   += (p.isFinal&&(sm.totalGoals||0)>0)?1:0;
    s.totalPnuts   += p.earned||0;
    s.totalSynergy += p.synergyBonus||0;
    if(p.isWin){ streak++; maxStreak=Math.max(maxStreak,streak); }
    else streak=0;
  }
  s.winStreak=maxStreak;
  s.wins=pesHistory.filter(p=>p.isWin).length;
  return s;
}

        if(d.balance!==undefined) setBalance(d.balance);
        if(d.matches)    setMatches(d.matches);
        if(d.betHistory) setBetHistory(d.betHistory);
        if(d.pnuts!==undefined) setPnuts(d.pnuts);
        if(d.pesHistory) setPesHistory(d.pesHistory);
        if(d.achievements) setAchievements(d.achievements);
        if(d.playerName) setPlayerName(d.playerName);
        if(d.season)     setSeason(d.season);
        if(d.seasonArchive) setSeasonArchive(d.seasonArchive);
      }
      setLoaded(true);
    })();
  },[]);

  // ── SAVE TO STORAGE ──
  useEffect(()=>{
    if(!loaded) return;
    storageSet("pes_manager_data",{balance,matches,betHistory,pnuts,pesHistory,achievements,playerName,season,seasonArchive});
  },[balance,matches,betHistory,pnuts,pesHistory,achievements,playerName,season,loaded]);

  // ── CHECK ACHIEVEMENTS ──
  useEffect(()=>{
    if(!loaded) return;
    const stats = calcStats(pesHistory);
    stats.totalPnuts = pnuts;
    const newOnes = ACHIEVEMENTS.filter(a=>!achievements.includes(a.id)&&a.check(stats));
    if(newOnes.length>0){
      setAchievements(ac=>[...ac,...newOnes.map(a=>a.id)]);
      setNewAchievement(newOnes[0]);
      setTimeout(()=>setNewAchievement(null),4000);
    }
  },[pesHistory,pnuts,loaded]);

  // ── TIMER ──
  useEffect(()=>{
    const m=matches.find(x=>x.id===openMatch);
    if(m?.status==="live"){
      timerRef.current=setInterval(()=>setLiveMinute(mn=>Math.min(mn+1,120)),60000);
    } else { clearInterval(timerRef.current); }
    return ()=>clearInterval(timerRef.current);
  },[openMatch,matches]);

  const notify=(msg,type="ok")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3200); };

  // ── ENCERRAR TEMPORADA ──

    const seasonStats = calcStats(pesHistory);
    seasonStats.totalPnuts = pnuts;
    const archived = {
      season,
      archivedAt: new Date().toLocaleString("pt-BR"),
      matches: [...matches],
      pesHistory: [...pesHistory],
      betHistory: [...betHistory],
      balance,
      pnuts,
      stats: seasonStats,
      achievements: [...achievements],

    setPesHistory([]);
    setBetHistory([]);

    // balance mantido intencionalmente
    setAchievements([]);
    setSeason(nextSeason);

  const startMatch=(id)=>{

        const pot=+(s*tOdd).toFixed(2);
        setBalance(b=>+(b-s).toFixed(2));
        const bet={id:Date.now(),matchId:id,bets:[...slip],stake:s,totalOdd:tOdd,potential:pot,status:"pending",date:new Date().toLocaleString("pt-BR")};
        setBetHistory(h=>[bet,...h]);
        setMatches(ms=>ms.map(m=>m.id===id?{...m,preBets:[...m.preBets,...slip]}:m));
      }
    }
    setMatches(ms=>ms.map(m=>m.id===id?{...m,status:"live"}:m));
    setBetSlip([]); setStakeInput(""); setLiveMinute(0);
    notify("🟢 Partida iniciada!");

  const addEvent=(matchId,eventType)=>{
    setMatches(ms=>ms.map(m=>{
      if(m.id!==matchId) return m;
      const ev={id:Date.now(),type:eventType,minute:liveMinute};

      const score={...m.score};
      if(GOAL_TYPES.includes(eventType)) score.my++;
      if(eventType==="adv_goal") score.adv++;
      return{...m,events:newEvents,score};

  };

  const removeLastEvent=(matchId,eventType)=>{
    setMatches(ms=>ms.map(m=>{

      if(GOAL_TYPES.includes(eventType)) score.my=Math.max(0,score.my-1);
      if(eventType==="adv_goal") score.adv=Math.max(0,score.adv-1);
      return{...m,events:newEvents,score};
    }));
  };

        </div>
        <div style={{display:"flex",gap:8}}>
          <input type="number" placeholder="Outro valor..." value={depInput} onChange={e=>setDepInput(e.target.value)} style={{...inp_s,flex:1}}/>
          <button onClick={()=>{const v=parseFloat(depInput);if(!v||v<=0)return;setBalance(b=>+(b+v).toFixed(2));setDepInput("");setDepOpen(false);notify(`R$ ${v.toFixed(2)} depositado!`);}} style={{background:`linear-gradient(135deg,${C.blue},${C.blueM})`,border:"none",color:"#fff",borderRadius:8,padding:"10px 20px",fontWeight:700}}>OK</button>
        </div>
      </Modal>}

      {/* ENCERRAR TEMPORADA */}
      {endSeasonOpen&&<EndSeasonModal season={season} onClose={()=>setEndSeasonOpen(false)} onConfirm={endSeason} pesHistory={pesHistory} pnuts={pnuts} matches={matches}/>}
      {matchOpen&&<Modal onClose={()=>setMatchOpen(false)} title="⚽ Nova Partida" wide>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div>
            <label style={lbl_s}>Meu Time</label>
            <input value={newM.myTeam} onChange={e=>setNewM(n=>({...n,myTeam:e.target.value}))} placeholder="Ex: Real Madrid" style={inp_s}/>
            {newM.myTeam&&<div style={{fontSize:"0.72rem",color:C.blue,marginTop:3}}>⚡ Força: {getRating(newM.myTeam)}/100</div>}
          </div>
          <div>
            <label style={lbl_s}>Adversário</label>
            <input value={newM.opponent} onChange={e=>setNewM(n=>({...n,opponent:e.target.value}))} placeholder="Ex: Barcelona" style={inp_s}/>
            {newM.opponent&&<div style={{fontSize:"0.72rem",color:C.textSoft,marginTop:3}}>⚡ Força: {getRating(newM.opponent)}/100</div>}

            {(()=>{const o=calcSmartOdds(newM.myTeam,newM.opponent); return <span style={{marginLeft:8}}>{newM.myTeam} <strong style={{color:C.blue}}>{o.A}</strong> · Empate <strong style={{color:C.blue}}>{o.D}</strong> · {newM.opponent} <strong style={{color:C.blue}}>{o.B}</strong></span>; })()}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div>
            <label style={lbl_s}>Competição</label>
            <select value={newM.competition} onChange={e=>setNewM(n=>({...n,competition:e.target.value}))} style={{...inp_s,appearance:"none"}}>
              {COMPS.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl_s}>Data do Jogo (calendário PES)</label>
            <input type="date" value={newM.matchDate} onChange={e=>setNewM(n=>({...n,matchDate:e.target.value}))} style={inp_s}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          <TogChip active={newM.isFinal} onClick={()=>setNewM(n=>({...n,isFinal:!n.isFinal}))}>🏆 É Final</TogChip>
          <TogChip active={newM.isNational} onClick={()=>setNewM(n=>({...n,isNational:!n.isNational}))}>🌍 Seleção</TogChip>
        </div>

        {/* JOGADORES */}
        <div style={{marginBottom:20}}>
          <label style={lbl_s}>👤 Jogadores (para odds individuais)</label>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input id="playerInput" placeholder="Ex: Haaland, Vini Jr..." style={{...inp_s,flex:1}} onKeyDown={e=>{
              if(e.key==="Enter"&&e.target.value.trim()){
                const name=e.target.value.trim();
                if(!newM.players.includes(name)) setNewM(n=>({...n,players:[...n.players,name]}));
                e.target.value="";
              }
            }}/>
            <button onClick={()=>{
              const inp=document.getElementById("playerInput");
              const name=inp?.value.trim();
              if(name&&!newM.players.includes(name)){setNewM(n=>({...n,players:[...n.players,name]}));if(inp)inp.value="";}
            }} style={{background:`linear-gradient(135deg,${C.blueMid},${C.blue})`,border:"none",color:"#fff",borderRadius:8,padding:"10px 16px",fontWeight:700}}>+</button>
          </div>
          {newM.players.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {newM.players.map(pl=>(
                <span key={pl} style={{background:"rgba(14,165,233,0.08)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:20,padding:"4px 12px",fontSize:"0.8rem",display:"flex",alignItems:"center",gap:6}}>
                  👤 {pl}
                  <button onClick={()=>setNewM(n=>({...n,players:n.players.filter(x=>x!==pl)}))} style={{background:"none",border:"none",color:C.accent,fontSize:"0.8rem",cursor:"pointer",padding:0,lineHeight:1}}>✕</button>
                </span>
              ))}
            </div>
          )}
          {newM.players.length>0&&<div style={{fontSize:"0.7rem",color:C.textSoft,marginTop:4}}>Serão geradas odds de "Marca Gol" e "Dá Assistência" para cada jogador.</div>}
        </div>
        <button onClick={createMatch} disabled={!newM.myTeam.trim()||!newM.opponent.trim()} style={{width:"100%",background:newM.myTeam.trim()&&newM.opponent.trim()?`linear-gradient(135deg,${C.blue},${C.blueM})`:"#e2e8f0",border:"none",color:newM.myTeam.trim()&&newM.opponent.trim()?"#fff":C.textSoft,borderRadius:10,padding:"13px",fontWeight:700,fontSize:"1rem",boxShadow:newM.myTeam.trim()&&newM.opponent.trim()?`0 4px 16px rgba(26,86,219,0.3)`:"none"}}>
          Criar Partida &amp; Gerar Odds Inteligentes →
        </button>
      </Modal>}

      <div className="main-content" style={{maxWidth:1440,margin:"0 auto",padding:"22px 16px",position:"relative",zIndex:1}}>
        {tab==="dashboard"&&<Dashboard matches={matches} pesHistory={pesHistory} pnuts={pnuts} balance={balance} stats={stats} achievements={achievements} season={season} setSeason={setSeason} playerName={playerName} seasonArchive={seasonArchive}/>}

        {tab==="apostas"&&(
          openMatch&&currentMatch?(
            <MatchDetail
              match={currentMatch} liveMinute={liveMinute} setLiveMinute={setLiveMinute}
              betSlip={betSlip} stakeInput={stakeInput} setStakeInput={setStakeInput}
              marketTab={marketTab} setMarketTab={setMarketTab}
              isBet={isBet} toggleBet={toggleBet} totalOdd={totalOdd} potential={potential} stakeVal={stakeVal}
              balance={balance} startMatch={startMatch} addEvent={addEvent}

          ):(

              onNew={()=>setMatchOpen(true)} settleBet={settleBet} balance={balance} pnuts={pnuts}

        {tab==="estrelato"&&<EstrelatoTab pesHistory={pesHistory} pnuts={pnuts} pesTab={pesTab} setPesTab={setPesTab} stats={stats}/>}
        {tab==="duelos"&&<DuelosTab pesHistory={pesHistory}/>}

      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({matches,pesHistory,pnuts,balance,stats,achievements,season,setSeason,playerName,seasonArchive}){
  const recent = pesHistory.slice(0,5);
  const upcoming = matches.filter(m=>m.status==="prelive"&&m.matchDate).sort((a,b)=>a.matchDate<b.matchDate?-1:1).slice(0,4);
  const live = matches.filter(m=>m.status==="live");

  // Gols por competição
  const byComp = {};
  for(const p of pesHistory){
    const c=p.competition;
    if(!byComp[c]) byComp[c]={comp:c,goals:0,matches:0,wins:0};
    byComp[c].goals+=(p.summary?.goals||0)+(p.summary?.fkGoals||0)+(p.summary?.cornerGoals||0);
    byComp[c].matches++;
    if(p.isWin) byComp[c].wins++;
  }
  const compArr = Object.values(byComp).sort((a,b)=>b.matches-a.matches).slice(0,5);

  const winRate = stats.totalMatches>0?Math.round(stats.wins/stats.totalMatches*100):0;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.8rem",letterSpacing:3,color:C.blueDark,lineHeight:1,fontWeight:900,textShadow:"0 2px 8px rgba(14,165,233,0.2)"}}>Bem-vindo, {playerName}!</div>
          <div style={{color:C.textSoft,fontSize:"0.84rem",marginTop:4,fontWeight:600}}>Temporada {season} · NARRYBET</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:"0.78rem",color:C.textMid,fontWeight:700}}>Temporada:</span>
          <input value={season} onChange={e=>setSeason(e.target.value)} style={{...inp_s,width:110,padding:"6px 10px",fontSize:"0.85rem"}}/>
        </div>
      </div>

      {live.length>0&&(
        <div style={{background:"linear-gradient(135deg,#fee2e2,#fff)",border:`2px solid ${C.live}`,borderRadius:14,padding:"14px 18px",marginBottom:18,display:"flex",alignItems:"center",gap:12}}>
          <span className="live-dot" style={{width:10,height:10,borderRadius:"50%",background:C.live,display:"inline-block",flexShrink:0}}/>
          <div style={{flex:1,fontWeight:700,color:C.live}}>{live[0].myTeam} vs {live[0].opponent} — AO VIVO {live[0].score.my}:{live[0].score.adv}</div>
        </div>
      )}

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:12,marginBottom:22}}>
        {[
          {icon:"🥜",val:pnuts,label:"Amendoins",col:C.gold,bg:"rgba(245,158,11,0.12)"},
          {icon:"💰",val:`R$${balance.toFixed(0)}`,label:"Saldo",col:C.blue,bg:C.blueLight},
          {icon:"⚽",val:stats.totalGoals,label:"Gols Totais",col:C.green,bg:C.greenL},
          {icon:"🅰️",val:stats.totalAssists,label:"Assistências",col:C.accentO,bg:"#fff7ed"},
          {icon:"🕹️",val:stats.totalMatches,label:"Partidas",col:C.blueDark,bg:C.blueLight},
          {icon:"📈",val:`${winRate}%`,label:"Taxa de Vitória",col:C.purple,bg:C.purpleL},
          {icon:"🏆",val:achievements.length,label:"Conquistas",col:C.gold,bg:C.goldL},
          {icon:"🔥",val:stats.winStreak,label:"Maior Sequência",col:C.accent,bg:C.liveL},
        ].map(s=>(
          <div key={s.label} style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
            <div style={{width:36,height:36,background:s.bg,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0}}>{s.icon}</div>
            <div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.6rem",color:s.col,lineHeight:1,letterSpacing:1}}>{s.val}</div>
              <div style={{fontSize:"0.62rem",color:C.textSoft,fontWeight:700,letterSpacing:0.5}}>{s.label.toUpperCase()}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:18}}>
        {/* Próximas */}
        <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:16,padding:18,backdropFilter:"blur(12px)",boxShadow:"0 4px 20px rgba(14,165,233,0.07),0 1px 0 rgba(255,255,255,0.7) inset",border:"1px solid rgba(255,255,255,0.5)"}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",letterSpacing:3,color:C.blue,marginBottom:12}}>📅 Próximas Partidas</div>
          {upcoming.length===0?<Empty>Nenhuma partida agendada</Empty>:(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {upcoming.map(m=>(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"rgba(14,165,233,0.08)",borderRadius:10}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:"0.86rem"}}>{m.myTeam} vs {m.opponent}</div>
                    <div style={{fontSize:"0.7rem",color:C.textSoft}}>{m.competition}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"0.95rem",color:C.blue,letterSpacing:1}}>{m.matchDate?new Date(m.matchDate+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}):"—"}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Por competição */}
        <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:16,padding:18,backdropFilter:"blur(12px)",boxShadow:"0 4px 20px rgba(14,165,233,0.07),0 1px 0 rgba(255,255,255,0.7) inset",border:"1px solid rgba(255,255,255,0.5)"}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",letterSpacing:3,color:C.blue,marginBottom:12}}>🏆 Por Competição</div>
          {compArr.length===0?<Empty>Nenhuma partida encerrada</Empty>:(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {compArr.map(c=>(
                <div key={c.comp} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,fontSize:"0.82rem",fontWeight:600,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.comp}</div>
                  <div style={{fontSize:"0.72rem",color:C.textSoft,minWidth:60,textAlign:"right"}}>{c.wins}V / {c.matches-c.wins}D</div>
                  <div style={{fontSize:"0.72rem",color:C.green,minWidth:40,textAlign:"right",fontWeight:700}}>{c.goals}⚽</div>
                  <div style={{width:60,height:6,background:C.border,borderRadius:4,overflow:"hidden",flexShrink:0}}>
                    <div style={{width:`${c.matches>0?Math.round(c.wins/c.matches*100):0}%`,height:"100%",background:C.green,borderRadius:4}}/>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Últimas partidas */}
      <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:16,padding:18,backdropFilter:"blur(12px)",boxShadow:"0 4px 20px rgba(14,165,233,0.07),0 1px 0 rgba(255,255,255,0.7) inset",border:"1px solid rgba(255,255,255,0.5)"}}>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",letterSpacing:3,color:C.blue,marginBottom:12}}>🕹️ Últimas Partidas</div>
        {recent.length===0?<Empty>Nenhuma partida encerrada</Empty>:(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {recent.map(p=>{
              const rc=p.isWin?C.green:p.isDraw?C.gold:C.accent;
              return(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px",background:"rgba(14,165,233,0.08)",borderRadius:10}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:rc,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <span style={{fontWeight:700,fontSize:"0.86rem"}}>{p.myTeam}</span>
                    <span style={{color:C.textSoft,fontSize:"0.82rem"}}> vs {p.opponent}</span>
                    <span style={{fontSize:"0.72rem",color:C.textSoft,marginLeft:6}}>· {p.competition}</span>
                  </div>

// ─── END SEASON MODAL ─────────────────────────────────────────────────────────
function EndSeasonModal({season,onClose,onConfirm,pesHistory,pnuts,matches}){
  const [nextSeason,setNextSeason] = useState(()=>{
    // Auto-suggest next season: "2024/25" -> "2025/26"
    const m = season.match(/^(\d{4})\/(\d{2})$/);
    if(m){
      const y=parseInt(m[1])+1;
      return `${y}/${String(y+1).slice(-2)}`;
    }
    return season+" (Nova)";
  });
  const stats = calcStats(pesHistory);
  const wr = stats.totalMatches>0?Math.round(stats.wins/stats.totalMatches*100):0;
  return(
    <Modal onClose={onClose} title="🏁 Encerrar Temporada">
      <div style={{background:"linear-gradient(135deg,rgba(245,158,11,0.15),rgba(251,191,36,0.1))",border:"1px solid rgba(245,158,11,0.3)",borderRadius:14,padding:"14px 16px",marginBottom:18,backdropFilter:"blur(8px)"}}>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",letterSpacing:2,color:C.gold,marginBottom:8}}>Resumo da Temporada {season}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[
            {label:"Partidas",val:stats.totalMatches},
            {label:"Vitórias",val:`${stats.wins} (${wr}%)`},
            {label:"Gols",val:stats.totalGoals},
            {label:"Assistências",val:stats.totalAssists},
            {label:"Amendoins",val:`${pnuts}🥜`},
            {label:"Hat-tricks",val:stats.hatTricks},
          ].map(x=>(
            <div key={x.label} style={{background:"rgba(255,255,255,0.65)",borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:"0.63rem",color:C.textSoft,fontWeight:700,letterSpacing:1}}>{x.label.toUpperCase()}</div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.2rem",color:C.blue,letterSpacing:1}}>{x.val}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{marginBottom:18}}>
        <label style={lbl_s}>Nome da Próxima Temporada</label>
        <input value={nextSeason} onChange={e=>setNextSeason(e.target.value)} style={inp_s} placeholder="Ex: 2025/26"/>
      </div>
      <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:"0.8rem",color:C.accent}}>
        ⚠️ Isso vai <strong>arquivar</strong> toda a temporada atual e iniciar uma nova do zero (partidas, amendoins, saldo resetados). Não pode ser desfeito.
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onClose} style={{flex:1,background:"#f1f5f9",border:"1px solid rgba(255,255,255,0.5)",color:C.textMid,borderRadius:10,padding:"11px",fontWeight:700}}>Cancelar</button>
        <button onClick={()=>nextSeason.trim()&&onConfirm(nextSeason.trim())} disabled={!nextSeason.trim()} style={{flex:1,background:`linear-gradient(135deg,#b45309,#d97706)`,border:"none",color:"#fff",borderRadius:10,padding:"11px",fontWeight:700,fontSize:"0.95rem"}}>🏁 Encerrar & Iniciar Nova</button>
      </div>
    </Modal>
  );
}

// ─── MINUTE SLIDER ────────────────────────────────────────────────────────────
function MinuteSlider({minute, onChange}){
  const trackRef = useRef(null);
  const dragging = useRef(false);

  const getMinuteFromEvent = useCallback((e)=>{
    const track = trackRef.current;
    if(!track) return minute;
    const rect = track.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const ratio = Math.max(0, Math.min(1, (clientX-rect.left)/rect.width));
    return Math.round(ratio*120);
  },[minute]);

  const onMouseDown=(e)=>{ dragging.current=true; onChange(getMinuteFromEvent(e)); };
  const onMouseMove=(e)=>{ if(dragging.current) onChange(getMinuteFromEvent(e)); };
  const onMouseUp=()=>{ dragging.current=false; };

  useEffect(()=>{
    window.addEventListener("mousemove",onMouseMove);
    window.addEventListener("mouseup",onMouseUp);
    window.addEventListener("touchmove",onMouseMove,{passive:true});
    window.addEventListener("touchend",onMouseUp);
    return()=>{
      window.removeEventListener("mousemove",onMouseMove);
      window.removeEventListener("mouseup",onMouseUp);
      window.removeEventListener("touchmove",onMouseMove);
      window.removeEventListener("touchend",onMouseUp);
    };
  },[onMouseMove]);

  const pct = (minute/120)*100;
  const isHT = minute>=45&&minute<90;
  const sectionColor = minute<45?C.green:minute<90?"#f59e0b":C.accent;

  return(
    <div style={{background:"rgba(14,165,233,0.08)",borderRadius:12,padding:"14px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.8rem",color:sectionColor,letterSpacing:2,lineHeight:1}}>{minute}'</div>
        <div style={{fontSize:"0.72rem",color:C.textSoft,fontWeight:600,textAlign:"right"}}>
          {minute<45?"1º TEMPO":minute<90?"2º TEMPO":"PRORROGAÇÃO"}
        </div>
        <div style={{display:"flex",gap:5}}>
          <button onClick={()=>onChange(Math.max(0,minute-1))} style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",color:C.blue,borderRadius:6,padding:"4px 10px",fontSize:"0.78rem",fontWeight:700}}>−1'</button>
          <button onClick={()=>onChange(Math.min(120,minute+1))} style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",color:C.blue,borderRadius:6,padding:"4px 10px",fontSize:"0.78rem",fontWeight:700}}>+1'</button>
        </div>
      </div>

      {/* Track */}
      <div ref={trackRef} onMouseDown={onMouseDown} onTouchStart={(e)=>{dragging.current=true;onChange(getMinuteFromEvent(e));}}
        style={{position:"relative",height:28,cursor:"pointer",userSelect:"none",touchAction:"none"}}>
        {/* Background sections */}
        <div style={{position:"absolute",top:"50%",transform:"translateY(-50%)",width:"100%",height:8,borderRadius:4,overflow:"hidden",display:"flex"}}>
          <div style={{width:"37.5%",background:"#bbf7d0"}}/>  {/* 0-45 */}
          <div style={{width:"2%",background:"#e5e7eb"}}/>
          <div style={{width:"37.5%",background:"#fde68a"}}/>  {/* 46-90 */}
          <div style={{width:"2%",background:"#e5e7eb"}}/>
          <div style={{width:"21%",background:"#fecaca"}}/>    {/* 91-120 */}
        </div>
        {/* Progress */}
        <div style={{position:"absolute",top:"50%",transform:"translateY(-50%)",left:0,width:`${pct}%`,height:8,background:sectionColor,borderRadius:4,transition:"width 0.05s",zIndex:1}}/>
        {/* Markers 45' 90' */}
        {[45,90].map(mn=>(
          <div key={mn} style={{position:"absolute",top:"50%",transform:"translate(-50%,-50%)",left:`${(mn/120)*100}%`,width:2,height:16,background:"#d1d5db",zIndex:2}}/>
        ))}
        {/* Handle */}
        <div style={{position:"absolute",top:"50%",transform:"translate(-50%,-50%)",left:`${pct}%`,width:22,height:22,borderRadius:"50%",background:"rgba(255,255,255,0.65)",border:`3px solid ${sectionColor}`,boxShadow:"0 2px 8px rgba(0,0,0,0.15)",zIndex:3,transition:"left 0.05s",cursor:"grab"}}/>
      </div>

      {/* Labels */}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:"0.65rem",color:C.textSoft}}>
        <span>0'</span><span style={{color:"#16a34a",fontWeight:600}}>45'</span><span style={{color:"#d97706",fontWeight:600}}>90'</span><span>120'</span>
      </div>
    </div>
  );
}

// ─── FORMA CHART ──────────────────────────────────────────────────────────────
function FormaChart({pesHistory}){
  const last20 = [...pesHistory].reverse().slice(0,20);
  if(last20.length===0) return <Empty>Nenhuma partida encerrada ainda.</Empty>;

  const maxGoals = Math.max(...last20.map(p=>(p.summary?.goals||0)+(p.summary?.fkGoals||0)+(p.summary?.cornerGoals||0)),1);

  // Gols per match running average (window 5)
  const goalsArr = last20.map(p=>(p.summary?.goals||0)+(p.summary?.fkGoals||0)+(p.summary?.cornerGoals||0));
  const avg5 = goalsArr.map((_,i)=>{
    const window = goalsArr.slice(Math.max(0,i-4),i+1);
    return +(window.reduce((a,b)=>a+b,0)/window.length).toFixed(2);
  });

  const chartH = 160;
  const chartW = Math.max(last20.length*38, 400);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>

            {last20.map((p,i)=>{
              const g=(p.summary?.goals||0)+(p.summary?.fkGoals||0)+(p.summary?.cornerGoals||0);
              const rc=p.isWin?C.green:p.isDraw?C.gold:C.accent;
              return(
                <div key={p.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:44}}>
                  <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"0.8rem",color:C.textSoft,letterSpacing:1}}>{i+1}</div>

      <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:16,padding:18,backdropFilter:"blur(12px)",boxShadow:"0 4px 20px rgba(14,165,233,0.07),0 1px 0 rgba(255,255,255,0.7) inset",border:"1px solid rgba(255,255,255,0.5)"}}>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",letterSpacing:3,color:C.blue,marginBottom:6}}>⚽ GOLS POR PARTIDA</div>
        <div style={{fontSize:"0.72rem",color:C.textSoft,marginBottom:14}}>Linha pontilhada = média móvel (5 jogos)</div>
        <div style={{overflowX:"auto"}}>
          <svg width={chartW} height={chartH+40} style={{display:"block"}}>
            {/* Grid lines */}
            {[0,1,2,3,4,5].filter(v=>v<=maxGoals+1).map(v=>{
              const y=chartH - (v/Math.max(maxGoals,1))*chartH;
              return <g key={v}>
                <line x1={0} y1={y} x2={chartW} y2={y} stroke="#e2e8f0" strokeWidth={1}/>
                <text x={0} y={y-3} fontSize={9} fill={C.textSoft}>{v}</text>
              </g>;
            })}
            {/* Bars */}
            {last20.map((p,i)=>{
              const g=(p.summary?.goals||0)+(p.summary?.fkGoals||0)+(p.summary?.cornerGoals||0);
              const barH=(g/Math.max(maxGoals,1))*chartH;
              const x=i*38+16;
              const rc=p.isWin?C.green:p.isDraw?C.gold:C.accent;
              return <g key={p.id}>
                <rect x={x} y={chartH-barH} width={22} height={barH} rx={4} fill={rc} opacity={0.8}/>
                {g>0&&<text x={x+11} y={chartH-barH-4} textAnchor="middle" fontSize={10} fill={rc} fontWeight="700">{g}</text>}
                <text x={x+11} y={chartH+14} textAnchor="middle" fontSize={9} fill={C.textSoft}>{i+1}</text>
              </g>;
            })}
            {/* Avg line */}
            {avg5.length>1&&(
              <polyline
                points={avg5.map((v,i)=>`${i*38+27},${chartH-(v/Math.max(maxGoals,1))*chartH}`).join(" ")}
                fill="none" stroke={C.blue} strokeWidth={2} strokeDasharray="4 3" opacity={0.7}
              />
            )}
          </svg>
        </div>
      </div>

      {/* Resumo forma */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {(()=>{
          const wins=last20.filter(p=>p.isWin).length;
          const draws=last20.filter(p=>p.isDraw).length;
          const losses=last20.filter(p=>!p.isWin&&!p.isDraw).length;
          const totalG=goalsArr.reduce((a,b)=>a+b,0);
          return [
            {icon:"🟢",label:"Vitórias",val:wins,col:C.green,bg:C.greenL},
            {icon:"🟡",label:"Empates",val:draws,col:C.gold,bg:C.goldL},
            {icon:"🔴",label:"Derrotas",val:losses,col:C.accent,bg:C.liveL},
            {icon:"⚽",label:"Gols totais",val:totalG,col:C.blue,bg:C.blueLight},
            {icon:"📊",label:"Média/jogo",val:last20.length>0?(totalG/last20.length).toFixed(1):0,col:C.purple,bg:C.purpleL},
            {icon:"🔥",label:"Melhor seq.",val:`${last20.reduce((a,p)=>{const s=p.isWin?a.cur+1:0;return{cur:s,max:Math.max(a.max,s)};},{cur:0,max:0}).max}V`,col:C.green,bg:C.greenL},
          ];
        })().map(s=>(
          <div key={s.label} style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,background:s.bg,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>{s.icon}</div>
            <div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.4rem",color:s.col,lineHeight:1,letterSpacing:1}}>{s.val}</div>
              <div style={{fontSize:"0.62rem",color:C.textSoft,fontWeight:700}}>{s.label.toUpperCase()}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ObjetivosPanel({pesHistory,stats}){
  // Calcular janelas
  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-7);
  const monthStart = new Date(now); monthStart.setDate(1); monthStart.setHours(0,0,0,0);

  const weekHistory = pesHistory.filter(p=>{
    if(!p.date) return false;
    // p.date = "dd/mm/yyyy, hh:mm:ss" from toLocaleString pt-BR
    const parts = p.date.split(", ")[0].split("/");
    const d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
    return d >= weekStart;
  });
  const monthHistory = pesHistory.filter(p=>{
    if(!p.date) return false;
    const parts = p.date.split(", ")[0].split("/");
    const d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
    return d >= monthStart;
  });

  const weekObjs = OBJECTIVES.filter(o=>o.period==="semanal");
  const monthObjs = OBJECTIVES.filter(o=>o.period==="mensal");

  const ObjCard=({obj,history})=>{
    const done = obj.check(history);
    return(
      <div style={{background:"rgba(255,255,255,0.65)",border:`2px solid ${done?"#86efac":C.border}`,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,opacity:1}}>
        <div style={{width:40,height:40,background:done?C.greenL:C.blueLight,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{obj.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:"0.88rem",color:done?C.green:C.text}}>{obj.name}</div>
          <div style={{fontSize:"0.74rem",color:C.textSoft,marginTop:1}}>{obj.desc}</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          {done?(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:"1.3rem"}}>✅</span>
              <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:"0.85rem",color:C.green,letterSpacing:1}}>+{obj.reward}🥜</span>
            </div>
          ):(
            <div style={{background:C.goldL,borderRadius:8,padding:"4px 10px",fontFamily:"'Orbitron',sans-serif",fontSize:"0.9rem",color:C.gold,letterSpacing:1}}>+{obj.reward}🥜</div>
          )}
        </div>
      </div>
    );
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:22}}>
      <div style={{background:"rgba(14,165,233,0.08)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:12,padding:"12px 16px",fontSize:"0.8rem",color:C.textMid}}>
        ℹ️ Os objetivos são <strong>automáticos</strong> — eles verificam seu histórico recente. Os semanais olham os últimos 7 dias, os mensais olham o mês atual.
      </div>

      <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:16,padding:18,backdropFilter:"blur(12px)",boxShadow:"0 4px 20px rgba(14,165,233,0.07),0 1px 0 rgba(255,255,255,0.7) inset",border:"1px solid rgba(255,255,255,0.5)"}}>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",letterSpacing:3,color:C.blue,marginBottom:4}}>🗓️ SEMANAIS</div>
        <div style={{fontSize:"0.72rem",color:C.textSoft,marginBottom:14}}>{weekHistory.length} partidas nos últimos 7 dias</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {weekObjs.map(o=><ObjCard key={o.id} obj={o} history={weekHistory}/>)}

      </div>

      <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:16,padding:18,backdropFilter:"blur(12px)",boxShadow:"0 4px 20px rgba(14,165,233,0.07),0 1px 0 rgba(255,255,255,0.7) inset",border:"1px solid rgba(255,255,255,0.5)"}}>

        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {monthObjs.map(o=><ObjCard key={o.id} obj={o} history={monthHistory}/>)}
        </div>
      </div>
    </div>
  );
}

// ─── CALENDÁRIO ───────────────────────────────────────────────────────────────
function CalendarioView({pesHistory}){
  const [viewDate,setViewDate] = useState(new Date());
  const year=viewDate.getFullYear(), month=viewDate.getMonth();
  const monthName=viewDate.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  // Map day -> matches
  const dayMap={};
  for(const p of pesHistory){
    if(!p.matchDate) continue;
    const [y,m,d]=p.matchDate.split("-").map(Number);
    if(y===year&&m-1===month){
      if(!dayMap[d]) dayMap[d]=[];
      dayMap[d].push(p);
    }
  }

  const prevMonth=()=>setViewDate(d=>new Date(d.getFullYear(),d.getMonth()-1,1));
  const nextMonth=()=>setViewDate(d=>new Date(d.getFullYear(),d.getMonth()+1,1));
  const today=new Date();

  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const weeks=[];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));

  return(
    <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:16,overflow:"hidden",backdropFilter:"blur(12px)",boxShadow:"0 4px 24px rgba(14,165,233,0.08),0 1px 0 rgba(255,255,255,0.7) inset",border:"1px solid rgba(255,255,255,0.55)"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.blueMid},${C.blue})`,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={prevMonth} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:8,padding:"6px 14px",fontWeight:700}}>‹</button>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.3rem",letterSpacing:3,color:"#fff",textTransform:"uppercase"}}>{monthName}</div>
        <button onClick={nextMonth} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:8,padding:"6px 14px",fontWeight:700}}>›</button>
      </div>
      {/* Weekday headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"rgba(14,165,233,0.08)",borderBottom:`1px solid ${C.border}`}}>
        {["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"].map(d=>(
          <div key={d} style={{textAlign:"center",padding:"8px 4px",fontSize:"0.7rem",fontWeight:700,color:C.textMid,letterSpacing:1}}>{d}</div>
        ))}
      </div>
      {/* Weeks */}
      {weeks.map((week,wi)=>(
        <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:wi<weeks.length-1?`1px solid ${C.border}`:"none"}}>
          {Array.from({length:7},(_,di)=>{
            const day=week[di]??null;
            const matches=day?dayMap[day]||[]:[];
            const isToday=day&&today.getDate()===day&&today.getMonth()===month&&today.getFullYear()===year;
            return(
              <div key={di} style={{minHeight:72,padding:"6px",background:isToday?C.blueLight:"#fff",borderRight:di<6?`1px solid ${C.border}`:"none"}}>
                {day&&(
                  <>
                    <div style={{fontWeight:isToday?700:400,fontSize:"0.78rem",color:isToday?C.blue:day?C.text:C.textSoft,marginBottom:3,width:22,height:22,borderRadius:"50%",background:isToday?C.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:isToday?"#fff":C.text}}>{day}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      {matches.slice(0,2).map(p=>{
                        const rc=p.isWin?C.green:p.isDraw?C.gold:C.accent;
                        return(
                          <div key={p.id} style={{background:rc,borderRadius:4,padding:"2px 5px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
                            <span style={{fontSize:"0.58rem",color:"#fff",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:44}}>{p.opponent}</span>
                            <span style={{fontSize:"0.65rem",color:"#fff",fontWeight:700,flexShrink:0}}>{p.score.my}–{p.score.adv}</span>
                          </div>
                        );
                      })}
                      {matches.length>2&&<div style={{fontSize:"0.58rem",color:C.textSoft,fontWeight:600}}>+{matches.length-2}</div>}
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      ))}
      {/* Legend */}
      <div style={{padding:"10px 16px",background:"rgba(14,165,233,0.08)",borderTop:`1px solid ${C.border}`,display:"flex",gap:16,flexWrap:"wrap"}}>
        {[{col:C.green,l:"Vitória"},{col:C.gold,l:"Empate"},{col:C.accent,l:"Derrota"}].map(({col,l})=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:"0.72rem",color:C.textMid}}>
            <div style={{width:10,height:10,borderRadius:2,background:col}}/>
            {l}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── DUELOS ───────────────────────────────────────────────────────────────────
function DuelosTab({pesHistory}){
  const [selected,setSelected]=useState(null);

  // Agrupar por adversário
  const dueloMap={};
  for(const p of pesHistory){
    const opp=p.opponent;
    if(!dueloMap[opp]) dueloMap[opp]={opponent:opp,matches:[],wins:0,draws:0,losses:0,goalsFor:0,goalsAgainst:0};
    dueloMap[opp].matches.unshift(p); // mais recente primeiro
    if(p.isWin) dueloMap[opp].wins++;
    else if(p.isDraw) dueloMap[opp].draws++;
    else dueloMap[opp].losses++;
    dueloMap[opp].goalsFor+=p.score.my;
    dueloMap[opp].goalsAgainst+=p.score.adv;
  }

  const duelos=Object.values(dueloMap).sort((a,b)=>b.matches.length-a.matches.length);
  const sel=selected?dueloMap[selected]:null;

  if(pesHistory.length===0) return <Empty>Nenhuma partida encerrada ainda. Registre jogos para ver o histórico de duelos!</Empty>;

  return(
    <div className="duelos-grid" style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:18,alignItems:"start"}}>
      {/* Lista de adversários */}
      <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:16,overflow:"hidden",backdropFilter:"blur(12px)",boxShadow:"0 4px 24px rgba(14,165,233,0.08),0 1px 0 rgba(255,255,255,0.7) inset",border:"1px solid rgba(255,255,255,0.55)"}}>
        <div style={{background:"linear-gradient(135deg,rgba(2,132,199,0.9),rgba(14,165,233,0.8))",backdropFilter:"blur(16px)",padding:"12px 16px",fontFamily:"'Orbitron',sans-serif",fontSize:"0.95rem",letterSpacing:3,color:"#fff",fontWeight:700,textShadow:"0 1px 4px rgba(0,0,0,0.2)",borderBottom:"1px solid rgba(255,255,255,0.2)"}}>⚔️ ADVERSÁRIOS</div>
        <div style={{maxHeight:600,overflowY:"auto"}}>
          {duelos.map(d=>{
            const wr=d.matches.length>0?Math.round(d.wins/d.matches.length*100):0;
            const isActive=selected===d.opponent;
            return(
              <div key={d.opponent} onClick={()=>setSelected(d.opponent)} style={{padding:"12px 16px",cursor:"pointer",background:isActive?C.blueLight:"#fff",borderBottom:`1px solid ${C.border}`,borderLeft:`3px solid ${isActive?C.blue:"transparent"}`,transition:"all 0.15s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{fontWeight:700,fontSize:"0.88rem",color:isActive?C.blue:C.text}}>{d.opponent}</div>
                  <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"0.9rem",color:C.textSoft,letterSpacing:1}}>{d.matches.length}x</div>
                </div>
                {/* mini barra V/E/D */}
                <div style={{display:"flex",height:5,borderRadius:4,overflow:"hidden",gap:1,marginBottom:4}}>
                  {d.wins>0&&<div style={{flex:d.wins,background:C.green}}/>}
                  {d.draws>0&&<div style={{flex:d.draws,background:C.gold}}/>}
                  {d.losses>0&&<div style={{flex:d.losses,background:C.accent}}/>}
                </div>
                <div style={{display:"flex",gap:8,fontSize:"0.68rem"}}>
                  <span style={{color:C.green,fontWeight:700}}>{d.wins}V</span>
                  <span style={{color:C.gold,fontWeight:700}}>{d.draws}E</span>
                  <span style={{color:C.accent,fontWeight:700}}>{d.losses}D</span>
                  <span style={{color:C.textSoft,marginLeft:"auto"}}>{wr}% V</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Detalhe do duelo */}
      {sel?(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {/* Header duelo */}
          <div style={{background:"linear-gradient(135deg,#1e429f,#1a56db)",borderRadius:16,padding:"20px 24px",color:"#fff"}}>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.6rem",letterSpacing:3,marginBottom:4}}>CONFRONTO DIRETO</div>
            <div style={{fontSize:"0.8rem",opacity:0.7,marginBottom:16}}>Desde o início do registro · {sel.matches.length} jogos</div>
            {/* Placar geral */}
            <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:12,alignItems:"center",marginBottom:16}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"2.8rem",color:"#fff",letterSpacing:2,lineHeight:1}}>{sel.wins}</div>
                <div style={{fontSize:"0.7rem",opacity:0.7,letterSpacing:1}}>VITÓRIAS</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.4rem",color:"rgba(255,255,255,0.6)",letterSpacing:2}}>{sel.draws}</div>
                <div style={{fontSize:"0.65rem",opacity:0.6,letterSpacing:1}}>EMPATES</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"2.8rem",color:"rgba(255,255,255,0.5)",letterSpacing:2,lineHeight:1}}>{sel.losses}</div>
                <div style={{fontSize:"0.7rem",opacity:0.6,letterSpacing:1}}>DERROTAS</div>
              </div>
            </div>
            {/* Barra confronto estilo SofaScore */}
            <div style={{display:"flex",height:10,borderRadius:6,overflow:"hidden",gap:2}}>
              {sel.wins>0&&<div style={{flex:sel.wins,background:"#4ade80"}}/>}

            </div>
          </div>

          {/* Stats gerais */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {[
              {icon:"⚽",label:"Gols marcados",val:sel.goalsFor,col:C.green,bg:C.greenL},
              {icon:"🔴",label:"Gols sofridos",val:sel.goalsAgainst,col:C.accent,bg:C.liveL},
              {icon:"📊",label:"Saldo de gols",val:`${sel.goalsFor-sel.goalsAgainst>0?"+":""}${sel.goalsFor-sel.goalsAgainst}`,col:sel.goalsFor>=sel.goalsAgainst?C.green:C.accent,bg:sel.goalsFor>=sel.goalsAgainst?C.greenL:C.liveL},
            ].map(s=>(
              <div key={s.label} style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:12,padding:"12px 14px",textAlign:"center"}}>
                <div style={{fontSize:"1.2rem",marginBottom:4}}>{s.icon}</div>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.8rem",color:s.col,letterSpacing:1,lineHeight:1}}>{s.val}</div>
                <div style={{fontSize:"0.65rem",color:C.textSoft,fontWeight:700,marginTop:2}}>{s.label.toUpperCase()}</div>
              </div>
            ))}
          </div>

          {/* Últimos confrontos */}
          <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:16,overflow:"hidden",backdropFilter:"blur(12px)",boxShadow:"0 4px 24px rgba(14,165,233,0.08),0 1px 0 rgba(255,255,255,0.7) inset",border:"1px solid rgba(255,255,255,0.55)"}}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontFamily:"'Orbitron',sans-serif",fontSize:"1rem",letterSpacing:3,color:C.blue}}>
              HISTÓRICO DE CONFRONTOS
            </div>
            {sel.matches.map((p,i)=>{
              const rc=p.isWin?C.green:p.isDraw?C.gold:C.accent;
              const label=p.isWin?"V":p.isDraw?"E":"D";
              const g=(p.summary?.goals||0)+(p.summary?.fkGoals||0)+(p.summary?.cornerGoals||0);
              return(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderBottom:i<sel.matches.length-1?`1px solid ${C.border}`:"none",background:i%2===0?"#fff":C.blueLight}}>
                  {/* resultado bolha */}
                  <div style={{width:28,height:28,borderRadius:"50%",background:rc,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:"0.78rem",flexShrink:0}}>{label}</div>
                  {/* times */}
                  <div style={{flex:1}}>
                    <div style={{fontSize:"0.86rem",fontWeight:600}}>{p.myTeam} <span style={{color:C.textSoft,fontWeight:400}}>vs</span> {p.opponent}</div>
                    <div style={{fontSize:"0.7rem",color:C.textSoft}}>{p.competition}{p.season?` · ${p.season}`:""}{p.matchDate?` · ${new Date(p.matchDate+"T12:00:00").toLocaleDateString("pt-BR")}`:""}</div>
                  </div>
                  {/* placar */}
                  <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.2rem",color:rc,letterSpacing:1,flexShrink:0}}>{p.score.my}–{p.score.adv}</div>
                  {/* gols */}
                  {g>0&&<div style={{fontSize:"0.8rem",color:C.green,fontWeight:700,flexShrink:0}}>⚽{g}</div>}
                </div>
              );
            })}
          </div>
        </div>
      ):(
        <div style={{background:"rgba(255,255,255,0.65)",border:`2px dashed ${C.border}`,borderRadius:16,padding:"52px 20px",textAlign:"center"}}>
          <div style={{fontSize:"3rem",marginBottom:10}}>⚔️</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.3rem",letterSpacing:2,color:C.blue,marginBottom:8}}>Selecione um Adversário</div>
          <div style={{color:C.textSoft,fontSize:"0.86rem"}}>Clique em um time à esquerda para ver o histórico completo de confrontos</div>
        </div>
      )}
    </div>
  );
}

// ─── MATCH HISTORY CARD ───────────────────────────────────────────────────────
function MatchHistoryCard({p}){
  const [open,setOpen]=useState(false);
  const s=p.summary;
  const rc=p.isWin?C.green:p.isDraw?C.gold:C.accent;
  return(
    <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:12,overflow:"hidden"}}>
      <div onClick={()=>setOpen(x=>!x)} style={{padding:"13px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:rc,flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:"0.9rem"}}>{p.myTeam} <span style={{color:C.textSoft,fontWeight:400}}>vs</span> {p.opponent}</div>
          <div style={{fontSize:"0.72rem",color:C.textSoft,marginTop:1}}>{p.competition}{p.season?` · ${p.season}`:""}{p.matchDate?` · ${new Date(p.matchDate+"T12:00:00").toLocaleDateString("pt-BR")}`:""}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{background:p.isWin?C.greenL:p.isDraw?C.goldL:C.liveL,color:rc,borderRadius:8,padding:"3px 10px",fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",letterSpacing:1}}>{p.score.my}–{p.score.adv}</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",color:C.gold,letterSpacing:1}}>+{p.earned}🥜</div>
          <span style={{color:C.textSoft,fontSize:"0.75rem",transform:open?"rotate(180deg)":"none",transition:"transform 0.2s",display:"inline-block"}}>▼</span>
        </div>
      </div>
      {open&&(
        <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`,background:"rgba(14,165,233,0.08)",animation:"fi 0.2s ease"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:7,marginBottom:10}}>
            {[
              s.goals>0&&{icon:"⚽",label:"Gol",val:s.goals,col:C.green},
              s.goalRight>0&&{icon:"👟",label:"Pé Dir.",val:s.goalRight,col:"#0891b2"},
              s.goalLeft>0&&{icon:"🦶",label:"Pé Esq.",val:s.goalLeft,col:"#059669"},
              s.goalHead>0&&{icon:"🗣️",label:"Cabeça",val:s.goalHead,col:"#7c3aed"},
              s.goalOutside>0&&{icon:"🌟",label:"Fora Área",val:s.goalOutside,col:"#db2777"},
              s.goalLob>0&&{icon:"🎩",label:"Cobertura",val:s.goalLob,col:"#b45309"},
              s.goalPost>0&&{icon:"🔔",label:"Travessão",val:s.goalPost,col:"#dc2626"},
              s.fkGoals>0&&{icon:"🎯",label:"Falta",val:s.fkGoals,col:"#0284c7"},
              s.cornerGoals>0&&{icon:"🚩",label:"Escanteio",val:s.cornerGoals,col:C.purple},
              s.assists>0&&{icon:"🅰️",label:"Assists.",val:s.assists,col:C.accentO},
              s.advGoals>0&&{icon:"🔴",label:"Gols Adv.",val:s.advGoals,col:C.accent},
              s.yellows>0&&{icon:"🟨",label:"Amarelo",val:s.yellows,col:C.gold},
              s.reds>0&&{icon:"🟥",label:"Vermelho",val:s.reds,col:C.accent},
            ].filter(Boolean).map(x=>(
              <div key={x.label} style={{background:"rgba(255,255,255,0.65)",borderRadius:8,padding:"7px 8px",textAlign:"center",border:"1px solid rgba(255,255,255,0.5)"}}>
                <div style={{fontSize:"0.9rem"}}>{x.icon}</div>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.3rem",color:x.col,letterSpacing:1,lineHeight:1}}>{x.val}</div>
                <div style={{fontSize:"0.6rem",color:C.textSoft,fontWeight:600}}>{x.label}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
            {s.hatTrick&&<Chip color={C.purple} bg={C.purpleL}>🔥 Hat-trick!</Chip>}
            {s.doublePack&&!s.hatTrick&&<Chip color={C.accentO} bg="#fff7ed">💥 Dobradinha!</Chip>}
            {s.hatTrickAssist&&<Chip color={C.accentO} bg="#fff7ed">🎩 Hat-trick Assist.!</Chip>}
            {p.isNational&&<Chip color="#0284c7" bg="#e0f2fe">🌍 Seleção</Chip>}
            {p.isFinal&&<Chip color="#b45309" bg="#fef3c7">🏆 Final</Chip>}
            {p.isWin&&<Chip color={C.green} bg={C.greenL}>🥇 Vitória</Chip>}
            {p.synergyBonus>0&&<Chip color={C.gold} bg={C.goldL}>⭐ +{p.synergyBonus} Sinergia</Chip>}
            {p.cardDebt>0&&p.debtCleared&&<Chip color={C.green} bg={C.greenL}>✅ Dívida quitada</Chip>}
            {p.cardDebt>0&&!p.debtCleared&&<Chip color={C.accent} bg={C.liveL}>⚠️ -{p.cardDebt}🥜 cartão</Chip>}
          </div>
          {p.events.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {p.events.map(ev=>{
                const et=EVENT_TYPES.find(x=>x.type===ev.type)||{icon:"•",label:ev.type,color:C.textSoft};
                return <span key={ev.id} style={{background:"rgba(255,255,255,0.65)",border:`1px solid ${et.color}40`,borderRadius:6,padding:"3px 7px",fontSize:"0.7rem",color:et.color,fontWeight:600}}>{ev.minute}' {et.icon} {et.label}</span>;
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function BetCard({bet,settleBet}){
  const sc={pending:{bg:C.blueLight,col:C.blue,lbl:"Pendente"},won:{bg:C.greenL,col:C.green,lbl:"✅ Ganhou"},lost:{bg:C.liveL,col:C.accent,lbl:"❌ Perdeu"}};
  const s=sc[bet.status];
  return(
    <div style={{background:"rgba(255,255,255,0.65)",border:"1px solid rgba(255,255,255,0.5)",borderRadius:14,padding:"13px 16px",backdropFilter:"blur(10px)",border:"1px solid rgba(255,255,255,0.5)"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <span style={{fontSize:"0.72rem",color:C.textSoft}}>{bet.date}</span>
        <span style={{background:s.bg,color:s.col,fontSize:"0.72rem",fontWeight:700,padding:"2px 8px",borderRadius:20}}>{s.lbl}</span>
      </div>
      {bet.bets.map((b,i)=>(
        <div key={i} style={{fontSize:"0.8rem",marginBottom:2}}>
          <strong>{b.myTeam} × {b.opponent}</strong><span style={{color:C.textMid}}> — {b.label}</span>
          <span style={{color:C.blue,fontWeight:700,marginLeft:5}}>@ {b.odd}</span>
        </div>
      ))}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
        <div style={{fontSize:"0.79rem"}}>
          R$ <strong>{bet.stake.toFixed(2)}</strong>
          <span style={{color:C.textSoft,margin:"0 4px"}}>·</span>
          Odd <strong>{bet.totalOdd}</strong>
          <span style={{color:C.textSoft,margin:"0 4px"}}>·</span>
          <span style={{color:C.green}}>R$ {bet.potential}</span>
        </div>
        {bet.status==="pending"&&(
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>settleBet(bet.id,true)} style={{background:C.greenL,border:"1px solid #86efac",color:C.green,borderRadius:6,padding:"4px 11px",fontWeight:700,fontSize:"0.74rem"}}>Ganhou</button>
            <button onClick={()=>settleBet(bet.id,false)} style={{background:C.liveL,border:"1px solid #fca5a5",color:C.accent,borderRadius:6,padding:"4px 11px",fontWeight:700,fontSize:"0.74rem"}}>Perdeu</button>
          </div>
        )}
      </div>
    </div>
  );
}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",letterSpacing:3,color:C.blueDark,fontWeight:700}}>{title}</div>
          <button onClick={onClose} style={{background:"rgba(14,165,233,0.1)",border:"1px solid rgba(14,165,233,0.2)",color:C.textSoft,fontSize:"1rem",lineHeight:1,borderRadius:8,padding:"4px 8px"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Chip({children,color,bg}){
  return <span style={{
    background:bg||"rgba(14,165,233,0.12)",color:color||C.blue,
    fontSize:"0.67rem",fontWeight:800,padding:"3px 10px",borderRadius:20,
    whiteSpace:"nowrap",border:`1px solid ${(color||C.blue)}30`,
    boxShadow:"0 1px 0 rgba(255,255,255,0.6) inset",
  }}>{children}</span>;
}
function TogChip({active,onClick,children}){
  return <button onClick={onClick} style={{
    background:active?"linear-gradient(180deg,#38bdf8,#0284c7)":"rgba(255,255,255,0.6)",
    color:active?"#fff":C.textMid,
    border:active?"1px solid #38bdf8":"1px solid rgba(14,165,233,0.25)",
    borderRadius:20,padding:"6px 14px",fontWeight:700,fontSize:"0.8rem",
    boxShadow:active?"0 4px 12px rgba(14,165,233,0.35),0 1px 0 rgba(255,255,255,0.3) inset":"0 1px 0 rgba(255,255,255,0.8) inset",
    backdropFilter:"blur(8px)",
  }}>{children}</button>;
}
function Empty({children}){
  return <div style={{
    textAlign:"center",padding:"28px",color:C.textSoft,fontSize:"0.86rem",
    background:"rgba(255,255,255,0.5)",backdropFilter:"blur(12px)",
    borderRadius:14,border:"1px dashed rgba(14,165,233,0.3)",
    fontWeight:600,
  }}>{children}</div>;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
    setTimeout(()=>{
      const l=document.getElementById('loading');
      if(l){l.style.opacity='0';setTimeout(()=>l.remove(),500);}
    },1000);
  </script>
</body>
</html>
